<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Page</title>

  <!-- Bootstrap 5 -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <!-- Custom styles -->
  <link rel="stylesheet" href="../css/product.css" />
</head>
<body>

  <!-- ============================================================
       PAGE WRAPPER — horizontally centered, max-width 1400px
       ============================================================ -->
  <main id="page-wrapper">

    <!-- 3-Column Product Grid -->
    <div id="product-grid">

      <!-- ======================================================
           COLUMN 1 — Product Image
           ====================================================== -->
      <aside id="col-image">
        <div id="product-image-wrapper">
          <img
            id="product-main-image"
            src=""
            alt="Product image"
          />
        </div>
      </aside><!-- /col-image -->


      <!-- ======================================================
           COLUMN 2 — Product Details
           ====================================================== -->
      <section id="col-details">

        <!-- Brand -->
        <p id="product-brand"></p>

        <!-- Title -->
        <h1 id="product-title"></h1>

        <!-- Rating & Reviews -->
        <div id="rating-wrapper">
          <span id="product-rating-value"></span>
          <span id="product-review-count"></span>
        </div>

        <!-- Price -->
        <p>
          <span id="product-price-detail"></span>
        </p>

        <!-- Return Policy -->
        <p id="product-return-policy"></p>

        <hr class="section-divider" />

        <!-- Category -->
        <p id="product-category-label">Category</p>
        <p id="product-category"></p>

        <!-- Tags -->
        <p id="product-tags-label">Tags</p>
        <div id="product-tags">
        </div>

        <!-- Description -->
        <p id="product-description-label">Description</p>
        <p id="product-description"></p>

        <!-- Dimensions / Weight -->
        <p id="product-dimensions-label">Dimensions &amp; Weight</p>
        <table id="product-specs-table">
          <tbody>
            <tr>
              <th scope="row" id="spec-label-width">Width</th>
              <td id="spec-value-width"></td>
            </tr>
            <tr>
              <th scope="row" id="spec-label-depth">Depth</th>
              <td id="spec-value-depth"></td>
            </tr>
            <tr>
              <th scope="row" id="spec-label-height">Height</th>
              <td id="spec-value-height"></td>
            </tr>
            <tr>
              <th scope="row" id="spec-label-weight">Weight</th>
              <td id="spec-value-weight"></td>
            </tr>
          </tbody>
        </table>

        <hr class="section-divider" />

        <!-- ---- Reviews Section ---- -->
        <div id="reviews-section">
          <h2 id="reviews-heading">Customer Reviews</h2>

          <div id="reviews-list">
          </div><!-- /reviews-list -->

        </div><!-- /reviews-section -->

      </section><!-- /col-details -->


      <!-- ======================================================
           COLUMN 3 — Purchase Panel
           ====================================================== -->
      <aside id="col-purchase">
        <div id="purchase-panel">

          <!-- Price -->
          <div id="purchase-price-block">
            <div id="product-price-purchase">$249.00</div>
          </div>

          <!-- Shipping & Availability -->
          <div id="shipping-section">

            <div class="info-row" id="shipping-row">
              <div class="info-row-icon">🚚</div>
              <div class="info-row-content">
                <div class="info-row-label">Shipping</div>
                <div class="info-row-value" id="product-shipping-info"></div>
              </div>
            </div>

            <div class="info-row" id="availability-row">
              <div class="info-row-icon">📦</div>
              <div class="info-row-content">
                <div class="info-row-label">Availability</div>
                <div class="info-row-value">
                  <span id="product-availability" class="in-stock"></span>
                </div>
              </div>
            </div>

          </div><!-- /shipping-section -->

          <!-- CTA Buttons -->
          <button id="btn-add-to-cart" type="button">Add to Cart</button>
          <button id="btn-buy-now"     type="button">Buy Now</button>

          <!-- Warranty -->
          <div id="warranty-section">
            <div id="warranty-title">Warranty</div>
            <p id="product-warranty"></p>
          </div>

        </div><!-- /purchase-panel -->
      </aside><!-- /col-purchase -->

    </div><!-- /product-grid -->
  </main><!-- /page-wrapper -->

<script type="module" src="../js/services/productPageService.js"></script>
</body>
</html>
