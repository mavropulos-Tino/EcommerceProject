<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Product Page</title>
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../styles/product.css"> -->
</head>
<body>

<div class="page-wrapper">
    <div class="product-grid">

        <!-- COL 1 — IMAGE -->
        <div class="col-image">
            <div class="img-wrap">
                <img id="productImg" src="" alt="Product" />
            </div>
        </div>

        <!-- COL 2 — INFO -->
        <div class="col-info">

            <div class="info-block">
                <div class="product-brand" id="productBrand"></div>
                <h1 class="product-title" id="productTitle"></h1>
            </div>

            <div class="info-block">
                <div class="rating-row">
                    <div class="stars" id="productStars"></div>
                    <span class="rating-score" id="productRating"></span>
                    <span class="rating-count" id="productReviewCount"></span>
                </div>
            </div>

            <div class="info-block">
                <div class="product-price" id="productPrice"></div>
            </div>

            <div class="info-block">
                <div class="meta-label">Return Policy</div>
                <div class="meta-value" id="returnPolicy"></div>
            </div>

            <hr class="divider" />

            <div class="info-block">
                <div class="meta-label">Category</div>
                <div class="meta-value" id="productCategory"></div>
            </div>

            <div class="info-block">
                <div id="productTags" class="tags-row"></div>
            </div>

            <div class="info-block">
                <div class="meta-label">Description</div>
                <p class="description" id="productDescription"></p>
            </div>

            <div class="info-block">
                <div class="meta-label">Dimensions &amp; Weight</div>
                <div class="specs-grid">
                    <div class="spec-item">
                        <div class="spec-key">Width</div>
                        <div class="spec-val" id="specWidth"></div>
                    </div>
                    <div class="spec-item">
                        <div class="spec-key">Height</div>
                        <div class="spec-val" id="specHeight"></div>
                    </div>
                    <div class="spec-item">
                        <div class="spec-key">Depth</div>
                        <div class="spec-val" id="specDepth"></div>
                    </div>
                    <div class="spec-item">
                        <div class="spec-key">Weight</div>
                        <div class="spec-val" id="specWeight"></div>
                    </div>
                </div>
            </div>

            <hr class="divider" />

            <div class="info-block">
                <div class="meta-label">Customer Reviews</div>
                <div id="reviewsContainer" class="reviews-list"></div>
            </div>

        </div>

        <!-- COL 3 — PURCHASE -->
        <div class="col-purchase">

            <div class="info-block">
                <div class="panel-price" id="panelPrice"></div>
            </div>

            <div class="info-block">
                <div class="meta-label">Shipping</div>
                <div class="meta-value" id="shippingInfo"></div>
            </div>

            <div class="info-block">
                <div class="meta-label">Availability</div>
                <div class="availability" id="availabilityStatus"></div>
            </div>

            <div class="info-block btn-group-col">
                <button class="btn-cart" id="btnCart">
                    <i class="bi bi-bag-plus"></i> Add to Cart
                </button>
                <button class="btn-buy" id="btnBuy">
                    <i class="bi bi-lightning-fill"></i> Buy Now
                </button>
            </div>

            <div class="info-block">
                <div class="meta-label">Warranty</div>
                <div class="meta-value" id="warrantyInfo"></div>
            </div>

        </div>

    </div>
</div>

<script type="module" src="../js/components/productPage/productPageHandler.js"></script>
<script type="module" src="../js/main.js"></script>
</body>
</html>
