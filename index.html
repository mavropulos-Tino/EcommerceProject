<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce Website Assignement</title>
    <link rel="stylesheet" href="/styles/components/heroStyles.css">
    <link rel="stylesheet" href="/styles/pageStyles/shopStyles.css">
    <link rel="stylesheet" href="/styles/components/footerStyles.css">
</head>
<body>
    <nav class="navbar sticky-top" id="mainNav">
        <div class="container-fluid px-2">
            <a class="navbar-brand" href="#">Ecommerce Academy Project</a>
            <a href="#" class="cart-btn" id="cartBtn" aria-label="Shopping cart">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                <span class="cart-badge" id="cartBadge">0</span>
            </a>
        </div>
    </nav>

    <section class="hero">
        <div>
        <h1 class="hero-title">New Season.<br>New Arrivals.</h1>
        <p class="hero-subtitle">Curated pieces for the modern wardrobe.</p>
        <a href="#shop" class="hero-btn">Shop Now</a>
        </div>
    </section>

    <section class="shop" id="shop">

        <aside class="filters">
            <p class="filters-title">Filters</p>
            <div class="filter-group">
                <label class="filter-label" for="category">Category</label>
                <select class="filter-select" id="category">
                <option value="all">All</option>
                </select>
            </div>
        </aside>

        <div class="shop-main">
            <div class="shop-search">
                <div class="search-input-wrap">
                    <input type="text" placeholder="Search products..." id="searchInput"/>
                    <button type="button" id="clearSearch">&times;</button>
                </div>
                <button type="button" id="searchButton">Search</button>
                <select id="sort">
                    <option value="noSortType">Sort by</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                </select>
            </div>

            <div class="product-grid"></div>
            <div class="pagination-wrap"></div>
        </div>
    </section>

    <footer class="footer">
        <a class="footer-brand" href="#">Ecommerce Academy Project</a>
        <div class="footer-social">
            <a href="#" aria-label="Instagram"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/></svg></a>
            <a href="#" aria-label="X"><svg viewBox="0 0 24 24"><path d="M4 4l16 16M20 4L4 20"/></svg></a>
            <a href="#" aria-label="Facebook"><svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg></a>
        </div>
        <span class="footer-copy">&copy; <script>document.write(new Date().getFullYear())</script> All rights reserved.</span>
    </footer>
    
    <script type="module" src="/scripts/main.js"></script>
</body>
</html>
